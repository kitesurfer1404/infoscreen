<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Robust WebSocket Tester</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        #messages {
            border: 1px solid #ccc;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }
        #input { width: 75%; }
        #status { font-weight: bold; margin-bottom: 10px; }
    </style>
    
    <link rel="stylesheet" href="http://localhost:8000/ctrl/ctrl.css">
    <script src="http://localhost:8000/sys/robustwebsocket.js"></script>
</head>
<body>

<h2>WebSocket Tester</h2>

<div id="status" class="status disconnected">Not connected</div>

<div id="messages"></div>

<input type="text" id="input" placeholder="Enter message..." />
<button onclick="sendMessage()">Senden</button>

<script>
    // ⚠️ Insert WebSocket URL here
    const socket = new RobustWebSocket("ws://localhost:8000/ctrl/ws");

    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");

    function setStatus(text, connected) {
        statusEl.textContent = text;
        statusEl.className = "status " + (connected ? "connected" : "disconnected");
    }

    function addMessage(text) {
        const div = document.createElement("div");
        div.textContent = text;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendMessage() {
        const text = inputEl.value;
        if (text.trim() === "") return;

        socket.send(text);
        addMessage("Sent: " + text);
        inputEl.value = "";
    }

    /* Event-Handler */

    socket.on("open", () => {
        setStatus("Connected", true);
    });

    socket.on("close", () => {
        setStatus("Disconnected (reconnecting...)", false);
    });

    socket.on("message", (msg) => {
        addMessage("Server: " + msg);
    });

    socket.on("error", (err) => {
        addMessage("Error: " + err);
    });

    /* Send with Enter */
    inputEl.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
